<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GesturePresenter</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div id="app">

        <!-- 摄像头区域 -->
        <div id="video-container">

            <video
                id="webcam"
                autoplay
                playsinline>
            </video>

            <canvas
                id="output-canvas">
            </canvas>

        </div>

        <!-- 状态栏 -->
        <div id="status-panel">

            <h2>Gesture Presenter</h2>

            <div class="status-item">
                当前模式：
                <span id="mode-text">
                    NORMAL
                </span>
            </div>

            <div class="status-item">
                当前手势：
                <span id="gesture-status">
                    Waiting...
                </span>
            </div>

        </div>

        <!-- 调试面板 -->
        <div id="debug-panel">

            <h3>Gesture Detection</h3>

            <div class="result-row">
                握拳：
                <span id="result-fist">--</span>
            </div>

            <div class="result-row">
                张开：
                <span id="result-open">--</span>
            </div>

            <div class="result-row">
                V字：
                <span id="result-v">--</span>
            </div>

            <div class="result-row">
                食指：
                <span id="result-index">--</span>
            </div>

            <div class="result-row">
                Swipe：
                <span id="result-swipe">--</span>
            </div>

        </div>

        <!-- 日志 -->
        <div id="log-panel">

            <h3>Event Log</h3>

            <div id="log-content">

            </div>

        </div>

    </div>

    <!-- MediaPipe -->

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>

    <!-- 手势模块 -->

    <script src="js/gesture/FingerDetector.js"></script>

    <script src="js/gesture/StaticGestureDetector.js"></script>

    <script src="js/gesture/SwipeDetector.js"></script>

    <script src="js/gesture/GestureRecognizer.js"></script>

    <script src="js/test.js"></script>

</body>

</html>
